<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sănătatea Mea - Weekly Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--bg2:#181820;--bg3:#22222d;--border:#303040;--text:#eaeaea;--text2:#9b9bac;--pink:#ff477e;--teal:#00e5ff;--yellow:#ffea00;--purple:#b06bff;--font:'Outfit',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding-bottom:30px}

/* Header & Nav */
.header{padding:15px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:700;color:white;display:flex;align-items:center;gap:8px}
.nav{display:flex;background:var(--bg2);padding:0 10px;border-bottom:1px solid var(--border)}
.nav-btn{padding:15px;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;flex:1}
.nav-btn.active{color:var(--teal);border-color:var(--teal)}

/* Layout */
.container{max-width:600px;margin:0 auto;padding:20px 15px}
.tab{display:none} .tab.active{display:block}
.card{background:var(--bg2);border-radius:12px;padding:15px;margin-bottom:15px;border:1px solid var(--border)}
.card-title{font-size:12px;text-transform:uppercase;color:var(--text2);letter-spacing:1px;font-weight:700;margin-bottom:15px}

/* Progress Bars */
.bar-wrap{margin-bottom:12px}
.bar-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;font-weight:600}
.bar-track{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.3s}

/* Lists */
.item-row{background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.item-name{font-weight:600;font-size:14px}
.item-meta{font-size:11px;color:var(--text2);margin-top:4px}
.item-del{color:var(--pink);background:none;border:none;font-size:18px;cursor:pointer;padding:0 5px}

/* Inputs & Buttons */
.btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:10px 15px;border-radius:8px;font-family:var(--font);font-weight:600;cursor:pointer;font-size:13px}
.btn-main{background:var(--teal);color:#000;border:none}
input{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:var(--font);margin-top:5px;outline:none}
input:focus{border-color:var(--teal)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:999;padding:15px}
.modal{background:var(--bg2);width:100%;max-width:400px;border-radius:12px;padding:20px;border:1px solid var(--border)}

/* Weekly Plan */
.day-card{background:var(--bg3);border-radius:10px;padding:15px;margin-bottom:15px;border:1px solid var(--border)}
.day-title{font-weight:700;color:var(--teal);margin-bottom:10px;font-size:15px}
.meal-box{margin-bottom:10px}
.meal-title{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.meal-item{font-size:13px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:4px 0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌿 Jurnal Nutriție</div>
  <div style="font-size:11px;color:var(--text2)" id="sync-lbl">Salvat local</div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="tab('jurnal')">Jurnal</button>
  <button class="nav-btn" onclick="tab('plan')">Plan Săptămânal</button>
  <button class="nav-btn" onclick="tab('profil')">Profil</button>
</div>

<div class="container">

  <!-- JURNAL -->
  <div id="t-jurnal" class="tab active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <button class="btn" onclick="chDay(-1)">‹</button>
      <div id="date-lbl" style="font-weight:700;font-size:16px"></div>
      <button class="btn" onclick="chDay(1)">›</button>
    </div>

    <div class="card">
      <div class="card-title">Progres Zilnic</div>
      <div class="bar-wrap">
        <div class="bar-head"><span>Calorii</span><span id="v-k">0 / 1500</span></div>
        <div class="bar-track"><div class="bar-fill" id="b-k" style="background:var(--purple);width:0%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-head"><span>Proteine</span><span id="v-p">0 / 100g</span></div>
        <div class="bar-track"><div class="bar-fill" id="b-p" style="background:var(--pink);width:0%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-head"><span>Carbohidrați</span><span id="v-c">0 / 120g</span></div>
        <div class="bar-track"><div class="bar-fill" id="b-c" style="background:var(--yellow);width:0%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-head"><span>Grăsimi</span><span id="v-f">0 / 55g</span></div>
        <div class="bar-track"><div class="bar-fill" id="b-f" style="background:var(--teal);width:0%"></div></div>
      </div>
    </div>

    <button class="btn btn-main" style="width:100%;margin-bottom:15px" onclick="openM('m-food')">+ Adaugă Aliment Manual</button>
    <div id="log-list"></div>
  </div>

  <!-- PLAN SAPTAMANAL -->
  <div id="t-plan" class="tab">
    <div class="card">
      <div class="card-title">Generator Mese</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:15px">Apasă butonul pentru a genera un plan complet pe 7 zile, calculat automat din țintele tale macro.</p>
      <button class="btn btn-main" style="width:100%" onclick="genWeek()">🎲 Generează 7 Zile</button>
    </div>
    <div id="week-container"></div>
  </div>

  <!-- PROFIL -->
  <div id="t-profil" class="tab">
    <div class="card">
      <div class="card-title">Necesar Zilnic (Macro)</div>
      <div class="form-grid">
        <div><label style="font-size:11px;color:var(--text2)">Calorii (kcal)</label><input type="number" id="p-k"></div>
        <div><label style="font-size:11px;color:var(--text2)">Proteine (g)</label><input type="number" id="p-p"></div>
        <div><label style="font-size:11px;color:var(--text2)">Carbohidrați (g)</label><input type="number" id="p-c"></div>
        <div><label style="font-size:11px;color:var(--text2)">Grăsimi (g)</label><input type="number" id="p-f"></div>
      </div>
      <button class="btn btn-main" style="width:100%;margin-top:10px" onclick="saveP()">💾 Salvează Profilul</button>
    </div>
  </div>

</div>

<!-- MODAL ADAUGARE ALIMENT -->
<div class="overlay" id="m-food">
  <div class="modal">
    <div class="card-title">Adaugă în Jurnal</div>
    <select id="f-m" style="margin-bottom:10px"><option>Mic dejun</option><option>Prânz</option><option>Cină</option><option>Gustare</option></select>
    
    <div style="position:relative;margin-bottom:10px">
      <input type="text" id="f-q" placeholder="Caută aliment..." autocomplete="off">
      <div id="f-sug" style="position:absolute;width:100%;max-height:150px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px;z-index:10"></div>
    </div>
    
    <div class="form-grid">
      <div><label style="font-size:11px">Cantitate (g)</label><input type="number" id="f-g" value="100" oninput="calcF()"></div>
      <div><label style="font-size:11px">Kcal total</label><input type="number" id="f-kc" readonly style="color:var(--teal)"></div>
    </div>
    
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:15px">
      <button class="btn" onclick="closeM('m-food')">Anulează</button>
      <button class="btn btn-main" onclick="addF()">Adaugă</button>
    </div>
  </div>
</div>

<script>
/* BAZA DE DATE (Comprimată pt eficientă)
   Format: [Nume, Kcal, Prot, Carb, Fat, Type]
   Type: 1=Prot, 2=Carb, 3=Fat, 4=Veggie
*/
const DB = [
  // PROTEINE (1)
  ["Ou întreg fiert", 155, 13, 1, 11, 1], ["Ou prăjit", 190, 13, 1, 15, 1], ["Albuș de ou", 52, 11, 1, 0, 1],
  ["Piept de pui grătar", 165, 31, 0, 3.6, 1], ["Pulpe pui la cuptor", 180, 24, 0, 9, 1], ["Ficat de pui", 172, 25, 0, 6.4, 1],
  ["Curcan la cuptor", 135, 30, 0, 1.5, 1], ["Mușchiuleț de porc", 143, 26, 0, 3.5, 1], ["Vită slabă gătită", 250, 26, 0, 15, 1],
  ["Somon cuptor", 208, 20, 0, 13, 1], ["Păstrăv grătar", 90, 19, 0, 1.5, 1], ["Ton în suc propriu", 116, 26, 0, 1, 1],
  ["Cottage Cheese (Perle)", 98, 11, 3.4, 4.3, 1], ["Telemea vacă", 270, 18, 1, 21, 1], ["Iaurt grecesc 2%", 60, 10, 3, 2, 1],
  
  // CARBOHIDRAȚI (2)
  ["Orez fiert", 130, 2.7, 28, 0.3, 2], ["Cartof copt/fiert", 86, 1.6, 20, 0.1, 2], ["Cartof dulce copt", 90, 2, 21, 0.2, 2],
  ["Mămăligă", 70, 2, 15, 0.2, 2], ["Paste fierte", 130, 5, 26, 0.5, 2], ["Pâine integrală", 247, 13, 41, 3.4, 2],
  ["Fulgi de ovăz", 389, 17, 66, 7, 2], ["Quinoa fiartă", 120, 4.4, 21, 1.9, 2], ["Năut / Fasole fiartă", 130, 9, 23, 1, 2],
  ["Măr", 52, 0, 14, 0, 2], ["Banană", 89, 1, 23, 0, 2], ["Fructe de pădure", 57, 0.7, 14, 0.3, 2],
  
  // GRĂSIMI (3)
  ["Ulei de măsline", 884, 0, 0, 100, 3], ["Unt 82%", 717, 0.8, 0, 81, 3], ["Avocado", 160, 2, 8, 15, 3],
  ["Nuci / Migdale", 600, 15, 14, 60, 3], ["Smântână 20%", 206, 3, 3, 20, 3], ["Măsline", 115, 0.8, 6, 11, 3],
  
  // LEGUME Libere (4)
  ["Roșii", 18, 1, 4, 0, 4], ["Castraveți", 15, 0.7, 3.6, 0.1, 4], ["Salată verde", 15, 1.5, 3, 0.2, 4],
  ["Broccoli/Spanac", 30, 3, 5, 0.3, 4], ["Ardei gras", 20, 1, 4.6, 0.2, 4], ["Ceapă", 40, 1, 9, 0, 4]
];

let S = { p: {k:1500, p:100, c:120, f:55}, log: [], plan: [] };
let cD = new Date(); cD.setHours(0,0,0,0);
let selF = null;

const gI = i => document.getElementById(i);
const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
const getISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

function init() {
  try { let d = localStorage.getItem('s_elite_data'); if(d) S = JSON.parse(d); } catch(e){}
  ['k','p','c','f'].forEach(x => gI('p-'+x).value = S.p[x]);
  if(S.plan && S.plan.length > 0) renderPlan();
  render();
}

function save() { try { localStorage.setItem('s_elite_data', JSON.stringify(S)); } catch(e){} }

// Tabs
function tab(t) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  gI('t-'+t).classList.add('active');
}

function chDay(v) { cD.setDate(cD.getDate()+v); render(); }
function openM(i) { gI(i).style.display='flex'; gI('f-q').value=''; gI('f-sug').innerHTML=''; selF=null; }
function closeM(i) { gI(i).style.display='none'; }

// Render Jurnal
function render() {
  let is = getISO(cD);
  gI('date-lbl').innerText = `${String(cD.getDate()).padStart(2,'0')}.${String(cD.getMonth()+1).padStart(2,'0')}.${cD.getFullYear()}` + (is === getISO(new Date()) ? ' (Azi)' : '');

  let dF = S.log.filter(x => x.d === is);
  let t = { k:0, p:0, c:0, f:0 };
  dF.forEach(x => { t.k+=x.k; t.p+=x.p; t.c+=x.c; t.f+=x.f; });

  // Update Progress Bars
  const updB = (id, val, max, unit) => {
    gI(`v-${id}`).innerText = `${Math.round(val)} / ${max}${unit}`;
    let pct = Math.min(100, (val/max)*100)||0;
    gI(`b-${id}`).style.width = `${pct}%`;
    gI(`b-${id}`).style.background = val > max ? 'var(--red)' : '';
  };
  updB('k', t.k, S.p.k, 'kcal'); updB('p', t.p, S.p.p, 'g');
  updB('c', t.c, S.p.c, 'g'); updB('f', t.f, S.p.f, 'g');

  // Render Log
  let lh = '';
  ['Mic dejun', 'Prânz', 'Cină', 'Gustare'].forEach(m => {
    let mF = dF.filter(x => x.m === m);
    if(!mF.length) return;
    lh += `<div style="font-size:11px;color:var(--teal);text-transform:uppercase;margin:15px 0 5px;font-weight:700">${m}</div>`;
    mF.forEach(x => {
      lh += `<div class="item-row">
        <div><div class="item-name">${x.n}</div><div class="item-meta">${x.q}g · P:${x.p} C:${x.c} G:${x.f}</div></div>
        <div style="display:flex;align-items:center"><span style="font-weight:700;font-size:13px">${x.k} kcal</span><button class="item-del" onclick="delL(${x.id})">×</button></div>
      </div>`;
    });
  });
  gI('log-list').innerHTML = lh || '<div style="text-align:center;padding:20px;font-size:13px;color:var(--text2)">Niciun aliment adăugat.</div>';
}

// Add Food Manual
gI('f-q').addEventListener('input', e => {
  let v = norm(e.target.value); gI('f-sug').innerHTML = ''; if(v.length < 2) return;
  let matches = DB.filter(x => norm(x[0]).includes(v)).slice(0, 10);
  matches.forEach(m => {
    let d = document.createElement('div');
    d.style.cssText = "padding:12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px";
    d.innerHTML = `${m[0]} <span style="color:var(--text2);font-size:11px">(${m[1]} kcal)</span>`;
    d.onclick = () => { selF = m; gI('f-q').value = m[0]; gI('f-sug').innerHTML = ''; calcF(); };
    gI('f-sug').appendChild(d);
  });
});

function calcF() {
  let q = +gI('f-g').value || 0;
  if(selF) gI('f-kc').value = Math.round(q * selF[1] / 100);
}

function addL() {
  if(!selF) return;
  let q = +gI('f-g').value || 0;
  S.log.push({
    id: Date.now(), d: getISO(cD), m: gI('f-m').value, n: selF[0], q: q,
    k: Math.round(q*selF[1]/100), p: Math.round(q*selF[2]/100), c: Math.round(q*selF[3]/100), f: Math.round(q*selF[4]/100)
  });
  save(); closeM('m-food'); render();
}
function delL(id) { S.log = S.log.filter(x => x.id !== id); save(); render(); }

// Save Profil
function saveP() {
  ['k','p','c','f'].forEach(x => S.p[x] = +gI('p-'+x).value);
  save(); render(); tab('jurnal');
}

// ==========================================
// WEEKLY PLANNER ALGORITHM
// ==========================================
function genWeek() {
  S.plan = [];
  const days = ["Ziua 1", "Ziua 2", "Ziua 3", "Ziua 4", "Ziua 5", "Ziua 6", "Ziua 7"];
  
  let pItems = DB.filter(x => x[5] === 1);
  let cItems = DB.filter(x => x[5] === 2);
  let fItems = DB.filter(x => x[5] === 3);
  let vItems = DB.filter(x => x[5] === 4);

  // Targets per meal (Total / 3)
  let tP = S.p.p / 3, tC = S.p.c / 3, tF = S.p.f / 3;

  for(let i=0; i<7; i++) {
    let dPlan = { name: days[i], meals: [] };
    
    ['Mic dejun', 'Prânz', 'Cină'].forEach(mName => {
      let meal = [];
      let prot = pItems[Math.floor(Math.random() * pItems.length)];
      let carb = Math.random() > 0.2 ? cItems[Math.floor(Math.random() * cItems.length)] : null;
      let fat = fItems[Math.floor(Math.random() * fItems.length)];
      let veg = (mName !== 'Mic dejun') ? vItems[Math.floor(Math.random() * vItems.length)] : null;

      let qP = (tP / prot[2]) * 100;
      let cFromP = (qP * prot[3])/100, fFromP = (qP * prot[4])/100;
      if(qP > 0) meal.push({ obj: prot, q: Math.round(qP) });

      let nC = tC - cFromP;
      if(carb && nC > 5) {
        let qC = (nC / carb[3]) * 100;
        fFromP += (qC * carb[4])/100;
        meal.push({ obj: carb, q: Math.round(qC) });
      }

      let nF = tF - fFromP;
      if(nF > 3) {
        let qF = (nF / fat[4]) * 100;
        meal.push({ obj: fat, q: Math.round(qF) });
      }

      if(veg) meal.push({ obj: veg, q: Math.round(Math.random()*100 + 100) }); // 100-200g legume libere

      dPlan.meals.push({ name: mName, items: meal });
    });
    S.plan.push(dPlan);
  }
  save(); renderPlan();
}

function renderPlan() {
  let c = gI('week-container');
  let h = '';
  S.plan.forEach((day, idx) => {
    h += `<div class="day-card"><div class="day-title">${day.name}</div>`;
    day.meals.forEach(m => {
      h += `<div class="meal-box"><div class="meal-title">${m.name}</div>`;
      m.items.forEach(it => {
        h += `<div class="meal-item"><span>${it.obj[0]}</span><span style="font-weight:700">${it.q}g</span></div>`;
      });
      h += `</div>`;
    });
    h += `<button class="btn btn-main" style="width:100%;margin-top:10px" onclick="applyPlan(${idx})">↳ Copiază în Jurnal (Azi)</button></div>`;
  });
  c.innerHTML = h;
}

function applyPlan(idx) {
  let day = S.plan[idx];
  let is = getISO(cD);
  day.meals.forEach(m => {
    m.items.forEach(it => {
      let q = it.q, o = it.obj;
      S.log.push({
        id: Date.now()+Math.random(), d: is, m: m.name, n: o[0], q: q,
        k: Math.round(q*o[1]/100), p: Math.round(q*o[2]/100), c: Math.round(q*o[3]/100), f: Math.round(q*o[4]/100)
      });
    });
  });
  save(); tab('jurnal'); render();
}

init();
</script>
</body>
</html>
